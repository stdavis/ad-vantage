name: Release

on:
  release:
    types: [published]

jobs:
  publish-artifact:
    name: Publish extension artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ github.event.release.tag_name }}
      CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
      CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
      CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
      CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}

    steps:
      - name: Check out released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production extension
        run: pnpm build

      - name: Package extension
        run: |
          archive="ad-vantage-${RELEASE_VERSION}.zip"
          cd dist
          zip -r "../${archive}" .
          echo "ARCHIVE_NAME=${archive}" >> "$GITHUB_ENV"

      - name: Upload extension archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${RELEASE_VERSION}" "$ARCHIVE_NAME" --clobber

      - name: Check Chrome Web Store configuration
        id: cws-config
        run: |
          missing=0

          for name in CWS_CLIENT_ID CWS_CLIENT_SECRET CWS_REFRESH_TOKEN CWS_EXTENSION_ID; do
            if [ -z "${!name}" ]; then
              echo "Missing $name; Chrome Web Store publish will be skipped."
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Chrome Web Store
        if: steps.cws-config.outputs.enabled == 'true'
        env:
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: pnpm exec chrome-webstore-upload --source "$ARCHIVE_NAME" --extension-id "$CWS_EXTENSION_ID"
