name: Release

on:
  release:
    types: [published]

jobs:
  publish-artifact:
    name: Publish extension artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production extension
        run: npm run build

      - name: Package extension
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: |
          archive="ad-vantage-v${RELEASE_VERSION}.zip"
          cd dist
          zip -r "../${archive}" .
          echo "ARCHIVE_NAME=${archive}" >> "$GITHUB_ENV"

      - name: Upload extension archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: gh release upload "v${RELEASE_VERSION}" "$ARCHIVE_NAME" --clobber
