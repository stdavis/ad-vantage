<!doctype html>
<html>
  <head>
    <title>Generate Ad-Vantage Icons</title>
  </head>
  <body>
    <h2>Generating icons... check your downloads folder!</h2>
    <script>
      const sizes = [16, 48, 128];

      const img = new Image();
      img.onload = () => {
        sizes.forEach((size) => {
          const canvas = document.createElement("canvas");
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext("2d");

          ctx.drawImage(img, 0, 0, size, size);

          const a = document.createElement("a");
          a.download = `icon${size}.png`;
          a.href = canvas.toDataURL("image/png");
          a.click();
        });
      };
      img.src = "./icon.svg";
    </script>
  </body>
</html>
